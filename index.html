<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kombel PAUD Karamen Simaeruk - Mentawai</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS External -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================ -->
<!-- NAVIGASI -->
<!-- ============================================ -->
<nav>
    <div class="nav-container">
        <button class="nav-btn active" data-page="cover">
            <i class="fas fa-home"></i> <span>Beranda</span>
        </button>
        <button class="nav-btn" data-page="deskripsi">
            <i class="fas fa-align-left"></i> <span>Deskripsi</span>
        </button>
        <button class="nav-btn" data-page="visimisi">
            <i class="fas fa-bullseye"></i> <span>Visi & Misi</span>
        </button>
        <button class="nav-btn" data-page="dokumentasi">
            <i class="fas fa-images"></i> <span>Dokumentasi</span>
        </button>
    </div>
</nav>

<!-- ============================================ -->
<!-- INDIKATOR ADMIN -->
<!-- ============================================ -->
<div id="adminIndicator" class="admin-indicator user-mode">
    <i class="fas fa-user"></i> Mode User
</div>

<!-- ============================================ -->
<!-- TOMBOL ADMIN TOGGLE -->
<!-- ============================================ -->
<button id="adminToggleBtn" class="admin-toggle-btn">
    <i class="fas fa-user-shield"></i>
</button>

<!-- ============================================ -->
<!-- PANEL ADMIN -->
<!-- ============================================ -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-panel-header">
        <h3><i class="fas fa-cog"></i> Panel Admin</h3>
        <button id="closeAdminBtn" class="close-admin-btn">&times;</button>
    </div>
    <div class="admin-panel-content">
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="cover">Cover</button>
            <button class="admin-tab" data-tab="deskripsi">Deskripsi</button>
            <button class="admin-tab" data-tab="visimisi">Visi & Misi</button>
            <button class="admin-tab" data-tab="dokumentasi">Dokumentasi</button>
        </div>
        
        <!-- Tab Cover -->
        <div id="tab-cover" class="admin-tab-content active">
            <h4><i class="fas fa-image"></i> Ganti Foto Cover</h4>
            <input type="file" id="coverUpload" accept="image/*" class="file-input">
            <div class="button-group">
                <button id="saveCoverBtn" class="btn btn-primary"><i class="fas fa-upload"></i> Upload</button>
                <button id="deleteCoverBtn" class="btn btn-danger"><i class="fas fa-trash"></i> Hapus</button>
            </div>
            <div style="margin-top:15px;">
                <img id="currentCoverImg" style="width:100%; border-radius:10px;">
            </div>
        </div>
        
        <!-- Tab Deskripsi -->
        <div id="tab-deskripsi" class="admin-tab-content">
            <h4><i class="fas fa-edit"></i> Edit Deskripsi</h4>
            <textarea id="deskripsiText" rows="10" class="form-textarea" placeholder="Tulis deskripsi komunitas di sini..."></textarea>
            <button id="saveDeskripsiBtn" class="btn btn-success"><i class="fas fa-save"></i> Simpan Deskripsi</button>
        </div>
        
        <!-- Tab Visi Misi -->
        <div id="tab-visimisi" class="admin-tab-content">
            <h4><i class="fas fa-eye"></i> Edit Visi</h4>
            <textarea id="visiText" rows="3" class="form-textarea" placeholder="Tulis visi komunitas di sini..."></textarea>
            <h4 style="margin-top:15px;"><i class="fas fa-list"></i> Edit Misi</h4>
            <textarea id="misiText" rows="6" class="form-textarea" placeholder="Tulis misi, pisahkan dengan enter (contoh: Misi 1: Deskripsi misi)"></textarea>
            <button id="saveVisimisiBtn" class="btn btn-success"><i class="fas fa-save"></i> Simpan Visi & Misi</button>
        </div>
        
        <!-- Tab Dokumentasi -->
        <div id="tab-dokumentasi" class="admin-tab-content">
            <h4><i class="fas fa-plus-circle"></i> Tambah Foto</h4>
            <input type="file" id="docUpload" accept="image/*" multiple class="file-input">
            <button id="addPhotosBtn" class="btn btn-primary"><i class="fas fa-cloud-upload-alt"></i> Upload Foto</button>
            <div id="galleryManager" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<!-- ============================================ -->
<!-- KONTEN HALAMAN -->
<!-- ============================================ -->
<main class="container">
    <!-- Halaman Cover -->
    <div id="cover-page" class="page active-page">
        <div class="hero-section">
            <div class="cover-photo-container">
                <img id="coverProfileImg" class="cover-photo" src="https://placehold.co/600x300/FCE9C4/B47C42?text=Ilustrasi+PAUD+Mentawai" alt="Cover PAUD">
            </div>
            <div class="hero-content">
                <h1>Gugus PAUD Karamen Simaeruk</h1>
                <p class="tagline">Bersatu dalam Perbedaan, Membangun Generasi Emas</p>
                <div class="hero-buttons">
                    <button id="toDeskBtn" class="btn-hero"><i class="fas fa-info-circle"></i> Tentang Kami</button>
                    <button id="toGalBtn" class="btn-hero-outline"><i class="fas fa-images"></i> Galeri Foto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Halaman Deskripsi -->
    <div id="deskripsi-page" class="page">
        <div class="section-card">
            <h2><i class="fas fa-align-left"></i> Deskripsi Komunitas</h2>
            <div id="deskripsiDisplay" class="deskripsi-content"></div>
        </div>
    </div>

    <!-- Halaman Visi & Misi -->
    <div id="visimisi-page" class="page">
        <div class="section-card">
            <h2><i class="fas fa-eye"></i> Visi</h2>
            <div id="visiDisplay" class="visi-content"></div>
        </div>
        <div class="section-card">
            <h2><i class="fas fa-list"></i> Misi</h2>
            <div id="misiDisplay" class="misi-content"></div>
        </div>
    </div>

    <!-- Halaman Dokumentasi -->
    <div id="dokumentasi-page" class="page">
        <div class="section-card">
            <h2><i class="fas fa-images"></i> Dokumentasi Kegiatan</h2>
            <div id="galleryContainer"></div>
        </div>
    </div>
</main>

<!-- ============================================ -->
<!-- LIGHTBOX -->
<!-- ============================================ -->
<div id="lightbox" class="lightbox" style="display:none;">
    <img id="lightboxImg" class="lightbox-img">
</div>

<!-- JavaScript External -->
<script src="app.js"></script>
</body>
</html>
